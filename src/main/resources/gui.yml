# You can customize the hotkey settings GUI here. Every item is fully
# customizable, including slot numbers, custom model data and skull textures.
#
# The default config uses YAML anchors so you don't have to define the same
# item over and over again: https://wiki.jeff-media.com/books/general-information/page/yaml-anchors
#
# Text fields (title, display-name, lore) use MiniMessage formatting:
# https://docs.advntr.dev/minimessage/format.html
#
# Items can be defined inside the "items" section using the following values:
#   material: DIAMOND
#   display-name: "<white>My Diamond"
#   lore:
#     - "First line"
#     - "<red>Red line"
#     - "<gradient:#ff0000:#ffffff>Red-to-white gradient"
#   amount: 1
#   base64: "<base64 string for player heads>"
#   custom-model-data: 2
#   enchantments:
#     unbreaking: 3
#     efficiency: 5
#   commands:
#     player:
#       - "say Hello"
#     console:
#       - "tell {player} Hello"
#
# You can then reference the item in the "slots" section using its name.

title: "<bold><color:#000000>[</color><color:#007700>Chest</color><color:#339933>Sort</color><color:#000000>]</color></bold> Settings"
size: 45
items:
  autosorting-enabled:
    display-name: &autosorting-name "<gradient:#2e86c1:#85c1e9><bold>Automatic Sorting</bold></gradient>"
    material: PLAYER_HEAD
    base64: &base64-enabled "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNWZmMzE0MzFkNjQ1ODdmZjZlZjk4YzA2NzU4MTA2ODFmOGMxM2JmOTZmNTFkOWNiMDdlZDc4NTJiMmZmZDEifX19"
    lore:
      - &lore-enabled "<gradient:#229954:#7dcea0><bold>Enabled</bold></gradient>"
      - &autosorting-lore-1 "<color:#d5dbdb>Automatically sorts all chests,</color>"
      - &autosorting-lore-2 "<color:#d5dbdb>barrels etc when you use them.</color>"
  autosorting-disabled:
    display-name: *autosorting-name
    material: PLAYER_HEAD
    base64: &base64-disabled "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNGU0YjhiOGQyMzYyYzg2NGUwNjIzMDE0ODdkOTRkMzI3MmE2YjU3MGFmYmY4MGMyYzViMTQ4Yzk1NDU3OWQ0NiJ9fX0="
    lore:
      - &lore-disabled "<gradient:#a93226:#e74c3c><bold>Disabled</bold></gradient>"
      - *autosorting-lore-1
      - *autosorting-lore-2
  autosorting-nopermission: &nopermission
    display-name: *autosorting-name
    material: BARRIER
    lore:
      - "<gradient:#a93226:#e74c3c>No Permission</gradient>"


  autoinvsorting-enabled:
    display-name: &autoinvsorting-name "<gradient:#2e86c1:#85c1e9><bold>Automatic Inventory Sorting</bold></gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &autoinvsorting-lore-1 "<color:#d5dbdb>Automatically sorts your player</color>"
      - &autoinvsorting-lore-2 "<color:#d5dbdb>inventory when you open it.</color>"
  autoinvsorting-disabled:
    display-name: *autoinvsorting-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *autoinvsorting-lore-1
      - *autoinvsorting-lore-2
  autoinvsorting-nopermission:
    <<: *nopermission
    display-name: *autoinvsorting-name


  shiftclick-enabled:
    display-name: &shiftclick-name "<gradient:#2e86c1:#85c1e9><bold>Shift-Click</bold></gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &shiftclick-lore-1 "<color:#d5dbdb>Sorts an inventory using Shift-click</color>"
      - &shiftclick-lore-2 "<color:#d5dbdb>on an empty slot.</color>"
  shiftclick-disabled:
    display-name: *shiftclick-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *shiftclick-lore-1
      - *shiftclick-lore-2
  shiftclick-nopermission:
    <<: *nopermission
    display-name: *shiftclick-name


  middleclick-enabled:
    display-name: &middleclick-name "<gradient:#2e86c1:#85c1e9><bold>Middle-Click</bold></gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &middleclick-lore-1 "<color:#d5dbdb>Sorts an inventory using Middle-click</color>"
      - &middleclick-lore-2 "<color:#d5dbdb>(mousewheel) on any slot.</color>"
  middleclick-disabled:
    display-name: *middleclick-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *middleclick-lore-1
      - *middleclick-lore-2
  middleclick-nopermission:
    <<: *nopermission
    display-name: *middleclick-name


  doubleclick-enabled:
    display-name: &doubleclick-name "<gradient:#2e86c1:#85c1e9><bold>Double-Click</bold></gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &doubleclick-lore-1 "<color:#d5dbdb>Sorts an inventory using Double-click</color>"
      - &doubleclick-lore-2 "<color:#d5dbdb>on an empty slot.</color>"
  doubleclick-disabled:
    display-name: *doubleclick-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *doubleclick-lore-1
      - *doubleclick-lore-2
  doubleclick-nopermission:
    <<: *nopermission
    display-name: *doubleclick-name


  shiftrightclick-enabled:
    display-name: &shiftrightclick-name "<gradient:#2e86c1:#85c1e9><bold>Shift-Right-Click</bold></gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &shiftrightclick-lore-1 "<color:#d5dbdb>Sorts an inventory using Shift-Right-click</color>"
      - &shiftrightclick-lore-2 "<color:#d5dbdb>on an empty slot.</color>"
  shiftrightclick-disabled:
    display-name: *shiftrightclick-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *shiftrightclick-lore-1
      - *shiftrightclick-lore-2
  shiftrightclick-nopermission:
    <<: *nopermission
    display-name: *shiftrightclick-name


  outside-enabled:
    display-name: &outside-name "<gradient:#2e86c1:#85c1e9><bold>Left-Click Block</bold></gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &outside-lore-1 "<color:#d5dbdb>Sorts a chest, barrel etc. by</color>"
      - &outside-lore-2 "<color:#d5dbdb>left-clicking it.</color>"
  outside-disabled:
    display-name: *outside-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *outside-lore-1
      - *outside-lore-2
  outside-nopermission:
    <<: *nopermission
    display-name: *outside-name


  leftclick-enabled:
    display-name: &leftclick-name "<gradient:#2e86c1:#85c1e9><bold>Fill Chest</bold></gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &leftclick-lore-1 "<color:#d5dbdb>Fill a chest with matching items by</color>"
      - &leftclick-lore-2 "<color:#d5dbdb>left-clicking outside the opened inventory.</color>"
      - &leftclick-lore-3 "<color:#d5dbdb>Fill a chest with all items (except your</color>"
      - &leftclick-lore-4 "<color:#d5dbdb>hotbar) by double-left-clicking outside</color>"
      - &leftclick-lore-5 "<color:#d5dbdb>the opened inventory.</color>"
  leftclick-disabled:
    display-name: *leftclick-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *leftclick-lore-1
      - *leftclick-lore-2
      - *leftclick-lore-3
      - *leftclick-lore-4
      - *leftclick-lore-5
  leftclick-nopermission:
    <<: *nopermission
    display-name: *leftclick-name


  rightclick-enabled:
    display-name: &rightclick-name "<gradient:#2e86c1:#85c1e9>Empty Chest</gradient>"
    material: PLAYER_HEAD
    base64: *base64-enabled
    lore:
      - *lore-enabled
      - &rightclick-lore-1 "<color:#d5dbdb>Take matching items from a chest by</color>"
      - &rightclick-lore-2 "<color:#d5dbdb>right-clicking outside the opened</color>"
      - &rightclick-lore-3 "<color:#d5dbdb>inventory. Take all items from a chest</color>"
      - &rightclick-lore-4 "<color:#d5dbdb>by double-left-clicking outside the</color>"
      - &rightclick-lore-5 "<color:#d5dbdb>opened inventory</color>"
  rightclick-disabled:
    display-name: *rightclick-name
    material: PLAYER_HEAD
    base64: *base64-disabled
    lore:
      - *lore-disabled
      - *rightclick-lore-1
      - *rightclick-lore-2
      - *rightclick-lore-3
      - *rightclick-lore-4
      - *rightclick-lore-5
  rightclick-nopermission:
    <<: *nopermission
    display-name: *rightclick-name


